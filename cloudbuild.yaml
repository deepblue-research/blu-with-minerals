steps:
  # 1. Build the unified Docker image (Backend + Frontend)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO_NAME/$_IMAGE_NAME:$SHORT_SHA"
      - "-t"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO_NAME/$_IMAGE_NAME:latest"
      - "-f"
      - "backend/Dockerfile"
      - "."

  # 2. Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO_NAME/$_IMAGE_NAME:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO_NAME/$_IMAGE_NAME:latest"

# Store the built images in Artifact Registry
# This ensures Cloud Build tracks these images as the build output.
images:
  - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO_NAME/$_IMAGE_NAME:$SHORT_SHA"
  - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO_NAME/$_IMAGE_NAME:latest"

# Substitutions allow you to share this file publicly while keeping
# your specific project configuration out of the source code.
# You can override these in the Cloud Build Trigger settings.
substitutions:
  _AR_HOSTNAME: "asia-south1-docker.pkg.dev"
  _AR_REPO_NAME: "invoice-generator"
  _IMAGE_NAME: "invoice-generator"

# Use Cloud Logging for build output
options:
  logging: CLOUD_LOGGING_ONLY
