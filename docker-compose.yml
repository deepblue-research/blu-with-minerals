services:
  # Unified Application Service (Backend + Frontend)
  # This service builds the image and runs the Express server which serves both the API and the React frontend.
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: invoice-generator-app

    # network_mode: host allows the container to use the host's networking stack directly.
    # This bypasses the virtual bridge and its MTU/fragmentation issues, making it behave
    # more like a native application on your machine.
    # Note: In 'host' mode, port mappings (ports:) are ignored as the container uses the host's ports.
    network_mode: "host"

    # Explicitly load environment variables from a .env file
    # This file should contain DATABASE_URL, GOOGLE_CLOUD_PROJECT, SMTP_HOST, etc.
    env_file:
      - backend/.env

    environment:
      - PORT=8080
      - NODE_ENV=production

    restart: on-failure
