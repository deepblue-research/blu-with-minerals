services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: invoice-generator-app
    ports:
      - "9090:8080"
    env_file:
      - backend/.env.local
    environment:
      - PORT=8080
      - NODE_ENV=local
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/neondb?sslmode=disable
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json
    volumes:
      - ${APPDATA}/gcloud/application_default_credentials.json:/tmp/adc.json:ro
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: invoice-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=neondb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
